site_name: Kilowahti
site_description: Home Assistant integration for Nordic/Baltic electricity spot pricing
site_url: https://kilowahti.github.io/kilowahti-docs/
repo_url: https://github.com/Kilowahti/ha-kilowahti
repo_name: Kilowahti/ha-kilowahti

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting started:
    - Installation: installation.md
    - Configuration: configuration.md
  - Reference:
    - Entities: entities.md
    - Services: services.md
  - Guides:
    - Optimization scores: scores.md
    - Transfer pricing: transfer-pricing.md
    - Fixed-price periods: fixed-periods.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
