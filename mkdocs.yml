site_name: Kilowahti
site_description: Home Assistant integration for Nordic/Baltic electricity spot pricing
site_url: https://docs.kilowahti.fi/
repo_url: https://github.com/Kilowahti/ha-kilowahti
repo_name: Kilowahti/ha-kilowahti

theme:
  name: material
  logo: assets/dark_icon.png
  favicon: assets/icon.png
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting started:
    - Installation: installation.md
    - Configuration: configuration.md
  - Reference:
    - Entities: entities.md
    - Services: services.md
  - Guides:
    - Automation examples: automations.md
    - Optimization scores: scores.md
    - Transfer pricing: transfer-pricing.md
    - Fixed-price periods: fixed-periods.md
  - Library:
    - Overview: lib/index.md
    - Models: lib/models.md
    - Calculations: lib/calc.md
    - Price sources: lib/sources.md
    - Constants: lib/const.md
  - FAQ: faq.md
  - Changelog: changelog.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
